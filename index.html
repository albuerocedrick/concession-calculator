<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inventory Variance Calculator</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f5f0;
        min-height: 100vh;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 2rem 1rem;
      }

      .container {
        background: #ffffff;
        border-radius: 12px;
        border: 1px solid #e0e0e0;
        padding: 1.75rem;
        width: 100%;
        max-width: 620px;
      }

      .calc-title {
        font-size: 11px;
        font-weight: 600;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 1.25rem;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
      }

      thead th {
        font-size: 12px;
        font-weight: 600;
        color: #888;
        padding: 6px 8px;
        text-align: right;
        border-bottom: 1px solid #e0e0e0;
      }
      thead th:first-child {
        text-align: left;
        width: 36%;
      }

      tbody tr {
        border-bottom: 1px solid #f0f0f0;
      }
      tbody tr:last-child {
        border-bottom: none;
      }

      td {
        padding: 5px 6px;
        vertical-align: middle;
      }

      .row-name {
        font-size: 13px;
        font-weight: 600;
        color: #333;
      }

      .formula-tag {
        font-size: 10px;
        color: #aaa;
        font-family: "Courier New", monospace;
        display: block;
        margin-top: 2px;
      }

      /* Yellow input cells */
      input[type="number"].cell-input {
        width: 100%;
        text-align: right;
        font-size: 14px;
        font-weight: 600;
        background: #fff9c4;
        border: 1px solid #e6d600;
        border-radius: 5px;
        padding: 5px 8px;
        color: #3d3000;
        -moz-appearance: textfield;
        transition:
          border-color 0.15s,
          background 0.15s;
      }
      input[type="number"].cell-input::-webkit-outer-spin-button,
      input[type="number"].cell-input::-webkit-inner-spin-button {
        -webkit-appearance: none;
      }
      input[type="number"].cell-input:focus {
        outline: none;
        border-color: #c8a400;
        background: #fffade;
      }

      /* Green calculated cells */
      .cell-calc {
        display: block;
        width: 100%;
        text-align: right;
        font-size: 14px;
        font-weight: 600;
        background: #c8e6c9;
        border: 1px solid #81c784;
        border-radius: 5px;
        padding: 5px 8px;
        color: #1b5e20;
      }
      .cell-calc.negative {
        background: #ffcdd2;
        border-color: #e57373;
        color: #b71c1c;
      }

      /* Neutral sum column */
      .cell-sum {
        display: block;
        width: 100%;
        text-align: right;
        font-size: 14px;
        font-weight: 600;
        background: #f5f5f5;
        border: 1px solid #e0e0e0;
        border-radius: 5px;
        padding: 5px 8px;
        color: #333;
      }
      .cell-sum.calc {
        background: #a5d6a7;
        border-color: #66bb6a;
        color: #1b5e20;
      }
      .cell-sum.calc.negative {
        background: #ef9a9a;
        border-color: #e57373;
        color: #b71c1c;
      }

      /* Summary cards */
      .summary-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-top: 1.25rem;
      }

      .summary-card {
        background: #f9f9f7;
        border: 1px solid #e8e8e4;
        border-radius: 8px;
        padding: 10px 14px;
      }
      .s-label {
        font-size: 11px;
        color: #888;
        margin-bottom: 4px;
      }
      .s-val {
        font-size: 22px;
        font-weight: 600;
        color: #1a1a1a;
      }
      .s-val.neg {
        color: #b71c1c;
      }
      .s-sub {
        font-size: 10px;
        color: #bbb;
        margin-top: 2px;
      }

      /* Reset button */
      .reset-btn {
        margin-top: 1rem;
        font-size: 12px;
        padding: 6px 14px;
        border-radius: 6px;
        border: 1px solid #ddd;
        background: #fff;
        color: #555;
        cursor: pointer;
        transition: background 0.15s;
      }
      .reset-btn:hover {
        background: #f5f5f5;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <p class="calc-title">Inventory Variance Calculator</p>

      <table>
        <thead>
          <tr>
            <th></th>
            <th>bttms</th>
            <th>tops</th>
            <th>total</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td><span class="row-name">beg</span></td>
            <td>
              <input
                type="number"
                class="cell-input"
                id="beg_b"
                value="11"
                oninput="calc()"
              />
            </td>
            <td>
              <input
                type="number"
                class="cell-input"
                id="beg_t"
                value="11"
                oninput="calc()"
              />
            </td>
            <td><span class="cell-sum" id="beg_sum">22</span></td>
          </tr>
          <tr>
            <td><span class="row-name">del</span></td>
            <td>
              <input
                type="number"
                class="cell-input"
                id="del_b"
                value="30"
                oninput="calc()"
              />
            </td>
            <td>
              <input
                type="number"
                class="cell-input"
                id="del_t"
                value="30"
                oninput="calc()"
              />
            </td>
            <td><span class="cell-sum" id="del_sum">60</span></td>
          </tr>
          <tr>
            <td><span class="row-name">sales</span></td>
            <td>
              <input
                type="number"
                class="cell-input"
                id="sal_b"
                value="12"
                oninput="calc()"
              />
            </td>
            <td>
              <input
                type="number"
                class="cell-input"
                id="sal_t"
                value="13"
                oninput="calc()"
              />
            </td>
            <td><span class="cell-sum" id="sal_sum">25</span></td>
          </tr>
          <tr>
            <td><span class="row-name">po</span></td>
            <td>
              <input
                type="number"
                class="cell-input"
                id="po_b"
                value="3"
                oninput="calc()"
              />
            </td>
            <td>
              <input
                type="number"
                class="cell-input"
                id="po_t"
                value="2"
                oninput="calc()"
              />
            </td>
            <td><span class="cell-sum" id="po_sum">5</span></td>
          </tr>
          <tr>
            <td>
              <span class="row-name">total</span>
              <span class="formula-tag">beg+del−sales−po</span>
            </td>
            <td><span class="cell-calc" id="tot_b">26</span></td>
            <td><span class="cell-calc" id="tot_t">26</span></td>
            <td><span class="cell-sum calc" id="tot_sum">52</span></td>
          </tr>
          <tr>
            <td><span class="row-name">scan</span></td>
            <td>
              <input
                type="number"
                class="cell-input"
                id="scn_b"
                value="15"
                oninput="calc()"
              />
            </td>
            <td>
              <input
                type="number"
                class="cell-input"
                id="scn_t"
                value="15"
                oninput="calc()"
              />
            </td>
            <td><span class="cell-sum" id="scn_sum">30</span></td>
          </tr>
          <tr>
            <td>
              <span class="row-name">variance</span>
              <span class="formula-tag">scan−total</span>
            </td>
            <td><span class="cell-calc" id="var_b">-11</span></td>
            <td><span class="cell-calc" id="var_t">-11</span></td>
            <td><span class="cell-sum calc" id="var_sum">-22</span></td>
          </tr>
        </tbody>
      </table>

      <div class="summary-grid">
        <div class="summary-card">
          <div class="s-label">Total (bttms+tops)</div>
          <div class="s-val" id="sum_total">52</div>
          <div class="s-sub">expected on hand</div>
        </div>
        <div class="summary-card">
          <div class="s-label">Scan (bttms+tops)</div>
          <div class="s-val" id="sum_scan">30</div>
          <div class="s-sub">physically counted</div>
        </div>
        <div class="summary-card">
          <div class="s-label">Variance (bttms+tops)</div>
          <div class="s-val neg" id="sum_var">-22</div>
          <div class="s-sub">scan − total</div>
        </div>
      </div>

      <button class="reset-btn" onclick="reset()">Reset to defaults</button>
    </div>

    <script>
      function v(id) {
        return parseFloat(document.getElementById(id).value) || 0;
      }

      function set(id, val, isCalc) {
        const el = document.getElementById(id);
        el.textContent = val;
        if (isCalc) {
          el.classList.remove("negative");
          if (val < 0) el.classList.add("negative");
        }
      }

      function calc() {
        const bb = v("beg_b"),
          bt = v("beg_t");
        const db = v("del_b"),
          dt = v("del_t");
        const sb = v("sal_b"),
          st = v("sal_t");
        const pb = v("po_b"),
          pt = v("po_t");
        const cb = v("scn_b"),
          ct = v("scn_t");

        // Row sums (bttms + tops)
        set("beg_sum", bb + bt);
        set("del_sum", db + dt);
        set("sal_sum", sb + st);
        set("po_sum", pb + pt);
        set("scn_sum", cb + ct);

        // Total = beg + del - sales - po
        const totB = bb + db - sb - pb;
        const totT = bt + dt - st - pt;
        set("tot_b", totB, true);
        set("tot_t", totT, true);
        set("tot_sum", totB + totT, true);

        // Variance = scan - total
        const varB = cb - totB;
        const varT = ct - totT;
        set("var_b", varB, true);
        set("var_t", varT, true);
        set("var_sum", varB + varT, true);

        // Summary cards
        document.getElementById("sum_total").textContent = totB + totT;
        document.getElementById("sum_scan").textContent = cb + ct;

        const sv = document.getElementById("sum_var");
        const totalVar = varB + varT;
        sv.textContent = totalVar;
        sv.className = "s-val" + (totalVar < 0 ? " neg" : "");
      }

      function reset() {
        const defaults = {
          beg_b: 0,
          beg_t: 0,
          del_b: 0,
          del_t: 0,
          sal_b: 0,
          sal_t: 0,
          po_b: 0,
          po_t: 0,
          scn_b: 0,
          scn_t: 0,
        };
        Object.entries(defaults).forEach(([id, val]) => {
          document.getElementById(id).value = val;
        });
        calc();
      }

      calc();
    </script>
  </body>
</html>
